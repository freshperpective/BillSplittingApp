name: sorted
description: Sorted — a clean, original bill-splitting app for Android and iOS.
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State + routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Local cache
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Money + utilities
  decimal: ^3.0.2
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # Theme persistence
  shared_preferences: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2

  rational: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  # Warm-paper background matching SortedTheme.paper (#FBFAF6).
  color: "#FBFAF6"
  color_dark: "#11151A"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FBFAF6"
    color_dark: "#11151A"

flutter_launcher_icons:
  # Generates all Android mipmap densities and the iOS AppIcon.appiconset
  # from the 1024×1024 source PNG produced by test/gen_icon_test.dart.
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): teal background + the icon as the foreground.
  adaptive_icon_background: "#0E7C66"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  # No bundled images yet. When you add them, drop the file in
  # assets/images/ and uncomment the line below.
  # assets:
  #   - assets/images/
