org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Workaround: Kotlin's incremental compiler cannot compute relative paths
# when the Pub cache (C:\) is on a different drive than the project (F:\).
# Disabling incremental compilation is slower per-build but avoids the
# "this and base files have different roots" crash.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
